name: Generate EuropePMC LabLinks XML

on:
  workflow_dispatch:
    inputs:
      provider_id:
        description: 'EuropePMC LabLinks provider ID'
        required: true
        type: string
  schedule:
    - cron: '0 10 * * 2'  # Every Tuesday at 10:00 AM UTC, ~12h after weekly-mining.yml

jobs:
  generate-labslinks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Generate LabLinks XML
      env:
        SERVICE_TOKEN: ${{ secrets.SERVICE_TOKEN }}
        SYNAPSE_PAT: ${{ secrets.SYNAPSE_PAT }}
      run: |
        PROVIDER_ID="${{ github.event.inputs.provider_id || vars.LABSLINKS_PROVIDER_ID }}"
        TOKEN="${SERVICE_TOKEN:-$SYNAPSE_PAT}"
        synapse-miner -v labslinks \
          --synapse-pat "$TOKEN" \
          --table-id syn66047339 \
          --provider-id "$PROVIDER_ID" \
          --output-dir labslinks/

    - name: Commit updated LabLinks XML
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add labslinks/
        if git diff --staged --quiet; then
          echo "No changes to LabLinks XML"
        else
          git commit -m "Update EuropePMC LabLinks XML [skip ci]"
          git push
          echo "LabLinks XML committed and pushed"
        fi

    - name: Upload LabLinks XML as artifact
      uses: actions/upload-artifact@v4
      with:
        name: labslinks-xml
        path: labslinks/
        retention-days: 90
